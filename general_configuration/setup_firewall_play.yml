---
- name: Configurazione Firewall UFW
  hosts: arm01
  tasks:
    - name: Installa UFW
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Reset di UFW
      community.general.ufw:
        state: reset

    - name: Blocca tutto in ingresso
      community.general.ufw:
        policy: deny
        direction: incoming

    - name: Permetti tutto in uscita
      community.general.ufw:
        policy: allow
        direction: outgoing

    - name: Permetti il traffico solo sulle porte scelte
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - '22'
        - '80'
        - '443'
        - '3493'
        - '5000'

    - name: Abilita il Firewall
      community.general.ufw:
        state: enabled
